services:

  # ─────────────────────────────────────────
  # KAFKA (KRaft mode — sin Zookeeper)
  # Imagen oficial: apache/kafka:3.7.0
  # Compatible con Spring Boot 3.3.5 / spring-kafka 3.2.x
  # ─────────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      # KAFKA_PROCESS_ROLES al tener los valores broker , controller le dices al contenedor que sea el que guarde los datos(broker) y el que gestiona el cluster(controller)
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENERS: PLAINTEXT://:9092,INTERNAL://:29092,CONTROLLER://:9093
      # KAFKA_ADVERTISED_LISTENERS , con esto le dices a kafka como los clientes deben conectarse a él
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # KAFKA_AUTO_CREATE_TOPICS_ENABLE con valor false, para que kafka no intente crear cualquier topico apenas alguien intente escribir en él , los topicos se crearan mediante el servicio kafka-init
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      # KAFKA_NUM_PARTITIONS cantidad maxima de particiones, siempre que AFKA_AUTO_CREATE_TOPICS_ENABLE fuera true, como es false la cantidad de particiones sales del kafka-init
      KAFKA_NUM_PARTITIONS: 3
      # TTL del mensaje, en este caso 7 dias
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_MESSAGE_MAX_BYTES: 1048576
      # KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - hotel-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────
  # KAFKA UI — Panel web
  # Acceso: http://localhost:8090
  # ─────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - hotel-network

volumes:
  kafka_data:
    driver: local

networks:
  hotel-network:
    driver: bridge